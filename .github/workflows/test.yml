name: Tests

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

jobs:
  build-images:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        distro: [noble, focal]
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Build image
        run: |
          docker build -f script/Dockerfile.${{ matrix.distro }} -t glb-director-build-${{ matrix.distro }}:latest .
          docker save glb-director-build-${{ matrix.distro }}:latest -o glb-director-build-${{ matrix.distro }}.tar

      - name: Upload image artifact
        uses: actions/upload-artifact@v3
        with:
          name: glb-director-build-${{ matrix.distro }}
          path: glb-director-build-${{ matrix.distro }}.tar
          retention-days: 1

  test:
    needs: build-images
    runs-on: ubuntu-latest
    strategy:
      matrix:
        test-suite: [director, director-xdp, healthcheck, redirect]
        distro: [noble, focal]
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Download image artifact
        uses: actions/download-artifact@v3
        with:
          name: glb-director-build-${{ matrix.distro }}

      - name: Load Docker image
        run: |
          docker load -i glb-director-build-${{ matrix.distro }}.tar

      - name: Run test suite in container
        run: |
          docker run --rm \
            --privileged \
            -v $(pwd):/workspace \
            -w /workspace \
            glb-director-build-${{ matrix.distro }}:latest \
            bash -c "script/test-glb-${{ matrix.test-suite }}"